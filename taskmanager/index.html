<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>✅ TaskMaster</h1>
            <p>Your personal task manager</p>
        </div>
        
        <div id="loginForm">
            <h2>Welcome Back</h2>
            <input type="email" id="loginEmail" placeholder="Email address" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button onclick="login()" class="btn-primary">Login</button>
            <p class="switch-form">Don't have an account? <a href="#" onclick="showSignup()">Create one</a></p>
        </div>

        <div id="signupForm" style="display:none;">
            <h2>Create Account</h2>
            <input type="email" id="signupEmail" placeholder="Email address" required>
            <input type="password" id="signupPassword" placeholder="Password" required>
            <button onclick="signup()" class="btn-primary">Sign Up</button>
            <p class="switch-form">Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
